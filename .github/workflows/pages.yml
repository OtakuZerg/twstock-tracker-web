name: Refresh market snapshot and deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. Offset from :00 to reduce peak-hour queue delay.
    - cron: "7,22,37,52 * * 1-5"

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout public artifact
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Validate snapshot builder
        run: |
          node --check scripts/build_market_snapshot.mjs
          node scripts/build_market_snapshot.mjs --self-test

      - name: Refresh fixed-source delayed snapshot
        run: node scripts/build_market_snapshot.mjs --output data/live_market.json

      - name: Stage runtime-only Pages site
        shell: bash
        run: |
          set -euo pipefail
          site="${RUNNER_TEMP}/site"
          mkdir -p "${site}"
          cp 404.html index.html web.html main.html site.webmanifest service-worker.js pages-build.json robots.txt .nojekyll "${site}/"
          cp -R app_files assets data "${site}/"
          test -s "${site}/data/live_market.json"
          test ! -e "${site}/scripts"
          test ! -e "${site}/.github"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: ${{ runner.temp }}/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
